name: Deploy to Firebase

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Read Flutter version
        id: flutter-version
        run: echo "version=$(tr -d '[:space:]' < .flutter-version)" >> $GITHUB_OUTPUT

      - name: Setup Flutter
        uses: flutter-actions/setup-flutter@v4
        with:
          channel: stable
          version: ${{ steps.flutter-version.outputs.version }}
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v5
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Test
        run: make test

      - name: Build web
        run: make build-web

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Setup Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Read project ID
        id: project
        run: echo "id=$(python3 -c "import json; print(json.load(open('.firebaserc'))['projects']['default'])")" >> $GITHUB_OUTPUT

      - name: Deploy
        run: make deploy

      - name: Deployment summary
        run: |
          echo "### Deployment Complete :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Project**: ${{ steps.project.outputs.id }}" >> $GITHUB_STEP_SUMMARY
          echo "- **URL**: https://${{ steps.project.outputs.id }}.web.app" >> $GITHUB_STEP_SUMMARY
